<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Model Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="brand">
                <h2>🤖 AI Hub</h2>
            </div>
            <nav class="nav-menu">
                <p class="nav-label">VISION MODELS</p>
                <button class="nav-btn active" data-target="digit-tool">
                    <span class="icon">🔢</span> 0-9 Digit Classifier
                </button>
                <button class="nav-btn" data-target="coming-soon">
                    <span class="icon">🖼️</span> Image Classifier (Soon)
                </button>
                
                <p class="nav-label mt-2">TEXT MODELS</p>
                <button class="nav-btn" data-target="coming-soon">
                    <span class="icon">💬</span> Sentiment Analysis (Soon)
                </button>
            </nav>
        </aside>

        <main class="main-content">
            
            <section id="digit-tool" class="view-section active">
                <div class="tool-header">
                    <h1>Digit Classifier</h1>
                    <p>Draw a number on the 28x28 pixel grid below to test the model.</p>
                </div>
                
                <div class="container">
                    <div class="canvas-container">
                        <div id="pixelGrid"></div>
                    </div>
                    
                    <div class="controls">
                        <button id="clearBtn" class="btn secondary">Clear Grid</button>
                        <button id="predictBtn" class="btn primary">Predict Digit</button>
                    </div>

                    <div class="result-container">
                        <h2>Prediction: <span id="predictionResult">--</span></h2>
                    </div>
                </div>
            </section>

            <section id="coming-soon" class="view-section">
                <div class="coming-soon-card">
                    <h1>🚀 New Model Coming Soon</h1>
                    <p>This space is reserved for future machine learning models.</p>
                </div>
            </section>

        </main>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
